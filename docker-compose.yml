services:
  todo-osint:
    build: .
    container_name: todo-osint
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
    restart: unless-stopped
    volumes:
      - todo_data:/app/data

volumes:
  todo_data:
